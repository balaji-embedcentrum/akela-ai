server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Strip /pack prefix — vite builds assets with /pack/ base but nginx serves from /
    location /pack/ {
        rewrite ^/pack/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }

    location /pack {
        return 301 /pack/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache index.html so browsers always get the latest JS bundle
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }
}
