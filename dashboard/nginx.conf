server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Strip /pack prefix — vite builds assets with /pack/ base but nginx serves from /
    location /pack/ {
        rewrite ^/pack/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }

    location /pack {
        return 301 /pack/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache index.html so browsers always get the latest JS bundle
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Never cache the service worker — if a stale SW gets pinned, users
    # stay on old code indefinitely. The SW itself decides what to cache.
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Service-Worker-Allowed "/pack/";
        try_files $uri =404;
    }

    # Manifest should also revalidate quickly so icon/name changes apply fast.
    location = /manifest.json {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
}
