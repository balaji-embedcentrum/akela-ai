version: '3.9'
# ============================================================
# Akela — Local Development Docker Compose
# For production, use docker-compose.prod.yml (Traefik + TLS).
#
# Setup:
#   cp .env.example .env   # fill in all values — see ADMIN_GUIDE.md
#   docker compose up --build
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: akela
      POSTGRES_USER: akela
      # Strong local dev fallback — set POSTGRES_PASSWORD in .env for anything real
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme-local-dev-only}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akela"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - akela-net

  redis:
    image: redis:7-alpine
    command: redis-server /usr/local/etc/redis/redis.conf
    tmpfs:
      - /data
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    env_file:
      - ./compose.dev.env
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - akela-net

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://akela:${POSTGRES_PASSWORD:-changeme-local-dev-only}@postgres:5432/akela
      # REDIS_URL uses REDIS_PASSWORD from compose.dev.env (must match redis/redis.conf)
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-changeme-local-dev-only-change-in-prod}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8201}
    ports:
      - "8200:8200"
    env_file:
      - ./compose.dev.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - akela-net

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://akela:${POSTGRES_PASSWORD:-changeme-local-dev-only}@postgres:5432/akela
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-changeme-local-dev-only-change-in-prod}
    env_file:
      - ./compose.dev.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - akela-net

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /akela-api
    ports:
      - "8201:80"
    depends_on:
      - api
    networks:
      - akela-net

  landing:
    build:
      context: ./landing
      dockerfile: Dockerfile
    ports:
      - "8202:80"
    networks:
      - akela-net

volumes:
  postgres_data:
  redis_data:

networks:
  akela-net:
    driver: bridge
