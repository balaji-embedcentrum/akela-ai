version: '3.9'
# ============================================================
# Akela — Production Docker Compose
# Set AKELA_DOMAIN and ACME_EMAIL in .env before running.
# ALL secrets must be set in .env — no fallback defaults exist.
# See ADMIN_GUIDE.md for full setup instructions.
# ============================================================

services:

  traefik:
    image: traefik:v2.11
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/acme/acme.json"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/acme.json:/acme/acme.json
    networks:
      - akela-net

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: akela
      POSTGRES_USER: akela
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akela"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - akela-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    tmpfs:
      - /data
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    env_file:
      - ./compose.prod.env
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - akela-net

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://akela:${POSTGRES_PASSWORD}@postgres:5432/akela
      # REDIS_URL uses REDIS_PASSWORD from compose.prod.env (must match redis/redis.conf)
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN}
    env_file:
      - ./compose.prod.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - akela-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${AKELA_DOMAIN}`) && PathPrefix(`/akela-api`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=le"
      - "traefik.http.services.api.loadbalancer.server.port=8200"

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://akela:${POSTGRES_PASSWORD}@postgres:5432/akela
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
    env_file:
      - ./compose.prod.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - akela-net

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - akela-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`${AKELA_DOMAIN}`) && PathPrefix(`/pack`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=le"
      - "traefik.http.services.dashboard.loadbalancer.server.port=80"

  landing:
    build:
      context: ./landing
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - akela-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.landing.rule=Host(`${AKELA_DOMAIN}`)"
      - "traefik.http.routers.landing.entrypoints=websecure"
      - "traefik.http.routers.landing.tls.certresolver=le"
      - "traefik.http.routers.landing.priority=1"
      - "traefik.http.services.landing.loadbalancer.server.port=80"

volumes:
  postgres_data:
  redis_data:

networks:
  akela-net:
    driver: bridge
